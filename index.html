<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS Territory Chess</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <button id="darkModeToggle" class="secondary-btn">🌙 Toggle Dark Mode</button>
            <h2>Settings</h2>
            
            <div class="setting-group">
                <label>Move Pattern:</label>
                <select id="movePattern">
                    <option value="111">1-1-1-1...</option>
                    <option value="122-same">1-2-2-2... (Same Piece)</option>
                    <option value="122-any">1-2-2-2... (Any Piece)</option>
                </select>
            </div>
            
            <div class="setting-group">
                <label>Splash Capture on Kill:</label>
                <select id="splashCapture">
                    <option value="none">None</option>
                    <option value="all">All Adjacent (8)</option>
                    <option value="ortho">Orthogonal Only (4)</option>
                    <option value="diag">Diagonal Only (4)</option>
                    <option value="cond-same">Conditional (Same as Attack)</option>
                    <option value="cond-opp">Conditional (Opposite to Attack)</option>
                </select>
            </div>

            <div class="setting-group">
                <label>
                    <input type="checkbox" id="captureTargetSquare" checked> 
                    Claim Target Square on Kill
                </label>
            </div>

            <div class="setting-group">
                <label>
                    <input type="checkbox" id="enforceAdjacency" checked> 
                    Block Adjacent Same-Type Opponents
                </label>
            </div>

            <div class="setting-group">
                <label>
                    <input type="checkbox" id="allowDoubleMove"> 
                    Allow Double Moves in Territory
                </label>
            </div>

            <div class="setting-group">
                <label class="slider-label">Bot Difficulty: <span id="botDiffValue" class="bold-text">0 (PvP)</span></label>
                <input type="range" id="botDifficulty" min="0" max="100" value="0">
                <small class="hint-text">1-34: Easy | 35-84: Medium | 85-100: Hard</small>
            </div>

            <button id="restartBtn">Restart Game</button>
            
            <div class="status-panel">
                <h3>Game Status</h3>
                <p id="turnIndicator" class="blue-text">Current Turn: Blue</p>
                <p id="movesLeft">Moves Left: 1</p>
                <div class="scores">
                    <p>Blue Territory: <span id="blueScore">0</span></p>
                    <p>Red Territory: <span id="redScore">0</span></p>
                </div>
                <p id="winnerMessage" class="hidden"></p>
            </div>
        </div>
        
        <div class="game-area">
            <div id="board" class="board"></div>
        </div>
    </div>

    <!-- The new AI Engine MUST be loaded before script.js -->
    <script src="bot.js"></script>
    <script src="script.js"></script>
</body>
</html>
